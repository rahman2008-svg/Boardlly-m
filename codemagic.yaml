workflows:
android-workflow:
name: Android Release Build

max_build_duration: 60

environment:
  java: 17

scripts:
  - chmod +x gradlew
  - ./gradlew clean
  - ./gradlew assembleRelease
  - ./gradlew bundleRelease

artifacts:
  - app/build/outputs/apk/release/*.apk
  - app/build/outputs/bundle/release/*.aab

publishing:
  email:
    recipients:
      - your-email@example.com
